name: Lint R Code

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install lintr
        run: |
          install.packages("lintr", repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Lint R files
        run: |
          lints <- lintr::lint_dir(".")
          if (length(lints) > 0) {
            print(lints)
            quit(status = 1)
          } else {
            message("No linting issues found.")
          }
        shell: Rscript {0}
