name: Shiny App Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shinytest2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies for chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            shiny
            shinyWidgets
            shinybusy
            shinyjs
            readr
            dplyr
            stringdist
            jsonlite
            ggplot2
            scales
            readxl
            digest
            mongolite
            rstudio/shinytest2

      - name: Run shinytest2 smoke test
        run: |
          testthat::test_dir("tests/testthat")
        shell: Rscript {0}
